<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Token Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: #1e1e1e;
      background: #fff;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e5e5;
    }
    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      transition: color .15s, border-color .15s;
    }
    .tab.active {
      color: #0d99ff;
      border-bottom-color: #0d99ff;
    }
    .tab:hover:not(.active) { color: #333; }

    /* ── Layout ── */
    .panel { padding: 16px; }

    .field + .field { margin-top: 12px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    input, select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #0d99ff;
      box-shadow: 0 0 0 2px rgba(13,153,255,.15);
      background: #fff;
    }
    input[type="password"] { font-family: monospace; letter-spacing: 2px; }
    input::placeholder { letter-spacing: 0; color: #bbb; font-family: inherit; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: #0d99ff; color: #fff; }
    .btn-primary:not(:disabled):hover { background: #0888e0; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:not(:disabled):hover { background: #e4e4e4; }
    .btn-danger { background: #fff0f0; color: #d03030; }
    .btn-danger:not(:disabled):hover { background: #ffe0e0; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .btn-row .btn { flex: 1; justify-content: center; }

    /* ── Status / Logs ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f7f7f7;
      border-bottom: 1px solid #e5e5e5;
      min-height: 40px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.idle     { background: #bbb; }
    .dot.ok       { background: #1abc7c; }
    .dot.working  { background: #0d99ff; animation: pulse 1s infinite; }
    .dot.error    { background: #e53e3e; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    .status-text { font-size: 12px; color: #555; flex: 1; }

    .log-area {
      margin: 12px 0 0;
      padding: 10px 12px;
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #444;
    }
    .log-area .log-error { color: #c0392b; }
    .log-area .log-ok    { color: #27ae60; }

    /* ── Sync cards ── */
    .sync-card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px;
    }
    .sync-card + .sync-card { margin-top: 12px; }
    .sync-card h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sync-card p {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }

    /* ── Validation hint ── */
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .hint a { color: #0d99ff; }
    .hint.ok    { color: #1abc7c; }
    .hint.error { color: #e53e3e; }

    .input-row {
      display: flex;
      gap: 6px;
    }
    .input-row input { flex: 1; }
    .btn-inline {
      flex-shrink: 0;
      padding: 7px 12px;
    }

    .loading-label {
      font-weight: 400;
      font-size: 10px;
      color: #aaa;
      text-transform: none;
      letter-spacing: 0;
    }

    .onboarding-header {
      background: #f0f7ff;
      border: 1px solid #c2deff;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 11px;
      color: #1a5fa8;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .notice {
      background: #fffbea;
      border: 1px solid #f5d76e;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 11px;
      color: #7a5c00;
      margin-bottom: 12px;
    }

    .persist-note {
      margin-top: 14px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
    }

    /* ── GitHub OAuth button ── */
    .btn-github {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      background: #24292f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-github:hover:not(:disabled) { background: #32383f; }
    .btn-github:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Device flow card ── */
    .device-flow-card {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .device-flow-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
    .device-code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #111;
      margin: 12px 0;
      user-select: all;
    }
    .device-flow-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px 0 10px;
    }
    .device-flow-actions a.btn { text-decoration: none; }
    .device-flow-footer {
      font-size: 11px;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .device-flow-countdown {
      font-family: monospace;
      color: #555;
    }
    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #0d99ff;
      display: inline-block;
      animation: pulse 1s infinite;
    }

    /* ── Connected card ── */
    .connected-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f7fdf9;
      border: 1px solid #c3e6cb;
      border-radius: 8px;
    }
    .connected-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1abc7c;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .connected-info { flex: 1; }
    .connected-name { font-weight: 600; font-size: 13px; }
    .connected-sub  { font-size: 11px; color: #888; }

    .btn-danger-ghost {
      background: none;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-danger-ghost:hover { background: #fee2e2; }

    /* ── Small text links ── */
    .btn-link {
      background: none;
      border: none;
      color: #0d99ff;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-link:hover { color: #0888e0; }
    .pat-toggle {
      display: block;
      margin-top: 10px;
      text-align: center;
      width: 100%;
    }

    /* ── OAuth status messages ── */
    .oauth-waiting {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 10px 0;
    }
    .oauth-error {
      font-size: 11px;
      color: #dc2626;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 16px 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .provider-row {
      display: flex;
      gap: 8px;
    }
    .provider-row select { flex: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
